title: CTF Writeups
description: "Mergesort(fries) CTF team writeups and exploits"
url: "https://Mergesort-fries.github.io"
baseurl: "/ctf-writeups"

# Team info
team_name: "Mergesort(fries)"
github_org: Mergesort-fries

# Members
members:
  - handle: matcha
    name: Ding Jie
    github: Notmatcha
  - handle: itsken
    name: Kendrix
    github: KenLZY
  - handle: jrxx
    name: Michael Jr Rasco
    github: michaeljrr

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

permalink: /:categories/:year/:month/:day/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - FRONT_MATTER_GUIDE.md
