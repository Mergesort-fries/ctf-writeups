<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="site-wrapper">
      <div class="header-inner">
        <a href="{{ '/' | relative_url }}" class="site-logo">
          <span class="logo-bracket">[</span>
          <span class="logo-text">{{ site.title | default: "CTF Writeups" }}</span>
          <span class="logo-bracket">]</span>
          <span class="logo-cursor"></span>
        </a>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}" class="nav-link{% if page.url == '/' %} active{% endif %}">home</a>
          <a href="{{ '/web' | relative_url }}" class="nav-link{% if page.url contains 'web' %} active{% endif %}">web</a>
          <a href="{{ '/crypto' | relative_url }}" class="nav-link{% if page.url contains 'crypto' %} active{% endif %}">crypto</a>
          <a href="{{ '/pwn' | relative_url }}" class="nav-link{% if page.url contains 'pwn' %} active{% endif %}">pwn</a>
          <a href="{{ '/rev' | relative_url }}" class="nav-link{% if page.url contains 'rev' %} active{% endif %}">rev</a>
          <a href="{{ '/forensics' | relative_url }}" class="nav-link{% if page.url contains 'forensics' %} active{% endif %}">forensics</a>
          <a href="{{ '/misc' | relative_url }}" class="nav-link{% if page.url contains 'misc' %} active{% endif %}">misc</a>
          <a href="{{ '/picoctf2026' | relative_url }}" class="nav-link{% if page.url contains 'picoctf' %} active{% endif %}">picoCTF</a>
          <a href="{{ '/team' | relative_url }}" class="nav-link{% if page.url contains 'team' %} active{% endif %}">team</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="site-wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-wrapper">
      <div class="footer-inner">
        <p class="footer-text">
          <span class="green">Mergesort(fries)</span>
          &nbsp;·&nbsp; CTF Team
        </p>
        <div class="footer-links">
          <a href="https://github.com/Mergesort-fries" target="_blank" rel="noopener">GitHub</a>
          <a href="{{ '/team' | relative_url }}">Team</a>
          <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
